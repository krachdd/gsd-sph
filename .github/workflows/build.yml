name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install cython "numpy>=2.0.0"

      - name: Build
        working-directory: gsd
        run: pip uninstall gsd -y 2>/dev/null || true && pip install -e .

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        working-directory: gsd
        run: pytest gsd/test/ -v
